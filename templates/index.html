<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HoneytrapX — Advanced Threat Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg:       #080d13;
    --panel:    #0d1520;
    --border:   #1a2a1a;
    --green:    #00ff88;
    --red:      #ff3355;
    --yellow:   #ffcc00;
    --blue:     #00aaff;
    --purple:   #cc44ff;
    --text:     #c8d8c8;
    --muted:    #556655;
    --mono:     'Share Tech Mono', monospace;
    --sans:     'Rajdhani', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh;
    background-image: radial-gradient(ellipse at 10% 20%, rgba(0,255,136,0.04) 0%, transparent 60%);
  }
  header { border-bottom: 1px solid var(--border); padding: 18px 32px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,255,136,0.03); }
  .logo h1 { font-size: 24px; color: var(--green); letter-spacing: 2px; }
  main { padding: 28px 32px; max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 1fr 400px; gap: 24px; }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
  .panel-header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .panel-title { color: var(--green); font-family: var(--mono); font-size: 14px; text-transform: uppercase; }

  #map { height: 400px; width: 100%; background: #05080b; }

  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 8px; text-align: center; }
  .stat-val { font-size: 32px; font-family: var(--mono); color: var(--green); display: block; }
  .stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; }

  .live-feed { height: 400px; overflow-y: auto; background: #05080b; padding: 15px; font-family: var(--mono); font-size: 12px; }
  .feed-entry { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #111; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-right: 5px; font-weight: bold; }
  .badge-mitre { background: var(--purple); color: white; }
  .badge-score { background: var(--red); color: white; }

  #canary-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--red); color: white; padding: 15px 40px; border-radius: 50px; z-index: 1000; font-weight: bold; display: none; box-shadow: 0 0 30px rgba(255,51,85,0.5); }
</style>
</head>
<body>

<div id="canary-alert">⚠️ CRITICAL: CANARY TOKEN TRIGGERED!</div>

<header>
  <div class="logo"><h1>HONEYTRAPX <span style="font-size:12px; color:var(--muted)">v2.0 STATEFUL</span></h1></div>
  <div style="color:var(--green); font-family:var(--mono)">[ MONITORING ACTIVE ]</div>
</header>

<main>
  <div class="left-col">
    <div class="stat-grid">
      <div class="stat-card"><span class="stat-val" id="count-attacks">0</span><span class="stat-lbl">Total Attacks</span></div>
      <div class="stat-card"><span class="stat-val" id="count-ips">0</span><span class="stat-lbl">Unique IPs</span></div>
      <div class="stat-card"><span class="stat-val" id="count-canaries">0</span><span class="stat-lbl">Canary Trips</span></div>
      <div class="stat-card"><span class="stat-val" id="count-sessions">0</span><span class="stat-lbl">Active Sessions</span></div>
    </div>

    <div class="panel">
      <div class="panel-header"><span class="panel-title">Global Threat Map</span></div>
      <div id="map"></div>
    </div>

    <div class="panel">
      <div class="panel-header"><span class="panel-title">Real-Time Event Stream</span></div>
      <div class="live-feed" id="live-feed"></div>
    </div>
  </div>

  <div class="right-col">
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Attack Vectors</span></div>
      <div class="panel-body" style="padding:20px"><canvas id="chart-vectors"></canvas></div>
    </div>

    <div class="panel">
      <div class="panel-header"><span class="panel-title">Top Targeted Ports</span></div>
      <div class="panel-body" style="padding:20px"><canvas id="chart-ports"></canvas></div>
    </div>

    <div class="panel">
      <div class="panel-header"><span class="panel-title">Security Notifications</span></div>
      <div id="notifications" style="padding:15px; font-size:12px; height:200px; overflow-y:auto"></div>
    </div>
  </div>
</main>

<script>
  function escapeHTML(str) {
    if (!str) return "";
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  const socket = io();
  const map = L.map('map', {zoomControl: false}).setView([20, 0], 2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

  let attacks = 0;
  let uniqueIPs = new Set();
  let canaries = 0;
  const portCounts = {};
  const vectorCounts = {};

  const ctxVectors = document.getElementById('chart-vectors').getContext('2d');
  const chartVectors = new Chart(ctxVectors, {
    type: 'doughnut',
    data: { labels: [], datasets: [{ data: [], backgroundColor: ['#00ff88', '#ff3355', '#ffcc00', '#00aaff', '#cc44ff'] }] },
    options: { plugins: { legend: { labels: { color: '#c8d8c8' } } } }
  });

  const ctxPorts = document.getElementById('chart-ports').getContext('2d');
  const chartPorts = new Chart(ctxPorts, {
    type: 'bar',
    data: { labels: [], datasets: [{ data: [], label: 'Hits', backgroundColor: '#00ff88' }] },
    options: { scales: { y: { ticks: { color: '#c8d8c8' } }, x: { ticks: { color: '#c8d8c8' } } } }
  });

  socket.on('new_attack', (data) => {
    attacks++;
    uniqueIPs.add(data.attacker_ip);
    document.getElementById('count-attacks').innerText = attacks;
    document.getElementById('count-ips').innerText = uniqueIPs.size;

    // Update charts
    portCounts[data.target_port] = (portCounts[data.target_port] || 0) + 1;
    chartPorts.data.labels = Object.keys(portCounts);
    chartPorts.data.datasets[0].data = Object.values(portCounts);
    chartPorts.update();

    if (data.mitre_tags && data.mitre_tags.length > 0) {
      data.mitre_tags.forEach(t => {
        vectorCounts[t.id] = (vectorCounts[t.id] || 0) + 1;
      });
      chartVectors.data.labels = Object.keys(vectorCounts);
      chartVectors.data.datasets[0].data = Object.values(vectorCounts);
      chartVectors.update();
    }

    // Add to feed
    const feed = document.getElementById('live-feed');
    const entry = document.createElement('div');
    entry.className = 'feed-entry';

    let mitreBadges = '';
    if (data.mitre_tags) {
        data.mitre_tags.forEach(t => {
            mitreBadges += `<span class="badge badge-mitre">${escapeHTML(t.id)}</span>`;
        });
    }

    entry.innerHTML = `
      <div style="display:flex; justify-content:space-between">
        <span style="color:var(--green)">${escapeHTML(data.attacker_ip)}</span>
        <span style="color:var(--muted)">${escapeHTML(data.timestamp)}</span>
      </div>
      <div style="margin:5px 0">
        <span class="badge badge-score">Score: ${escapeHTML(String(data.threat_score))}</span>
        ${mitreBadges}
        <span style="color:var(--blue)">${escapeHTML(data.service)} (${escapeHTML(String(data.target_port))})</span>
      </div>
      <div style="color:#aaa; font-style:italic">> ${escapeHTML(data.payload)}</div>
    `;
    feed.prepend(entry);

    // Add to map
    let lat = data.lat;
    let lon = data.lon;

    // Jitter for demo if on localhost so they don't stack at 0,0
    if (lat === 0 && lon === 0) {
        lat = (Math.random() * 120) - 60;
        lon = (Math.random() * 240) - 120;
    }
    L.circleMarker([lat, lon], {color: '#ff3355', radius: 5}).addTo(map);
  });

  socket.on('canary_triggered', (data) => {
    canaries++;
    document.getElementById('count-canaries').innerText = canaries;
    const alert = document.getElementById('canary-alert');
    alert.style.display = 'block';
    setTimeout(() => alert.style.display = 'none', 5000);

    const notif = document.getElementById('notifications');
    const div = document.createElement('div');
    div.style.color = 'var(--red)';
    div.style.marginBottom = '10px';
    div.innerText = `[${data.timestamp}] CANARY: ${data.file_path} accessed by ${data.attacker_ip}`;
    notif.prepend(div);
  });
</script>

</body>
</html>
