<!DOCTYPE html>
<html>
<head><title>phpMyAdmin</title></head>
<body style="font-family: sans-serif; background: #f0f0f0;">
    <div style="width: 600px; margin: 100px auto; background: white; border: 1px solid #aaa; padding: 20px;">
        <img src="https://www.phpmyadmin.net/static/images/logo-og.png" width="200"><br>
        <h3>Welcome to phpMyAdmin</h3>
        <form action="/login" method="post">
            <p>Language: <select><option>English</option></select></p>
            <div style="border: 1px solid #ccc; padding: 10px;">
                <p>Username: <input type="text" name="username"></p>
                <p>Password: <input type="password" name="password"></p>
                <button type="submit">Go</button>
            </div>
        </form>
    </div>
</body>
</html>
